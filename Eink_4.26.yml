esphome:
  name: dashboard
  on_boot:
    priority: 1000
    then:
      - switch.turn_on: power_switch
      - delay: 1s




esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
   # Tato volba vynutí interní 16MB partition table bez potřeby .csv souboru
  flash_size: 16MB
  framework:
    type: esp-idf

    sdkconfig_options:
      CONFIG_SPIRAM: y
      CONFIG_SPIRAM_MODE_OCT: y
      CONFIG_SPIRAM_TYPE_AUTO: y
      CONFIG_ESPTOOLPY_FLASHSIZE_16M: y
      CONFIG_ESPTOOLPY_FLASHSIZE: "16MB"
      CONFIG_LOG_COLORS: y
      CONFIG_ESP_CONSOLE_UART_BAUDRATE: "115200"
      CONFIG_VFS_SUPPORT_TERMIOS: y  


